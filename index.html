  body { background: #111; height: 100vh; overflow: hidden; margin: 0; }

  .card {
    position: absolute;
    width: 280px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
  
    border: 1px solid rgba(255, 255, 255, 0.1); 
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
  
    color: white;
    padding: 16px;
    border-radius: 16px;
    cursor: grab;
    font-family: sans-serif;
    transition: transform 0.1s ease-out;
    transform-style: preserve-3d;
}

  .rpc { display: flex; align-items: center; gap: 12px; pointer-events: none; }

  .state { font-size: 12px; color: #b5bac1; }

  .links {

    gap: 12px;

  }

  .social-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    transition: 0.2s;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .social-link img {
    width: 24px;
    height: 24px;
    filter: invert(1);
    opacity: 0.8;
  }

  .social-link:hover {
    background: rgba(255, 255, 255, 0.1);
    transform: translateY(-2px); /* Легкий подъем вверх */
  }

</style>

<script>
  const card = document.getElementById('card');
  let isDragging = false;
  let startX, startY;

  function centerCard() {
    const x = (window.innerWidth - card.offsetWidth) / 2;
    const y = (window.innerHeight - card.offsetHeight) / 2;
    card.style.left = x + 'px';
    card.style.top = y + 'px';
  }

  card.onmousemove = (e) => {
    if (isDragging) return;
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const rotX = (rect.height / 2 - y) / 8;
    const rotY = (x - rect.width / 2) / 8;
    card.style.transform = `perspective(1000px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
  };

  card.onmouseleave = () => {
    if (!isDragging) card.style.transform = `perspective(1000px) rotateX(0) rotateY(0)`;
  };

  card.onmousedown = (e) => {
    isDragging = true;
    startX = e.clientX - card.offsetLeft;
    startY = e.clientY - card.offsetTop;
    card.style.transition = "none";
  };

  document.onmousemove = (e) => {
    if (!isDragging) return;
    card.style.left = (e.clientX - startX) + 'px';
    card.style.top = (e.clientY - startY) + 'px';
  };

  document.onmouseup = () => {
    isDragging = false;
    card.style.transition = "transform 0.1s ease-out";
  };
  centerCard()
</script>
